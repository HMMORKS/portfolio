    <style>
        /* --- CSS Variables & Color Scheme --- */
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --accent-blue: #00d4ff;
            --accent-green: #00ff88;
            --accent-red: #ff3366;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --gradient-1: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
            --gradient-2: linear-gradient(135deg, var(--accent-red), var(--accent-blue));
            --transition: all 0.3s ease;
        }

        /* --- Global Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            color: var(--text-main);
        }

        a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: var(--transition);
        }

        a:hover {
            color: var(--accent-green);
        }

        /* --- Navigation --- */
        header {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 2px solid transparent;
            border-image: var(--gradient-1);
            border-image-slice: 1;
        }

        nav ul {
            display: flex;
            justify-content: center;
            list-style: none;
            padding: 1rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tab-btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: var(--transition);
        }

        .tab-btn:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .tab-btn.active {
            background: var(--gradient-1);
            color: #000;
            border-color: transparent;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        /* --- Main Content Area --- */
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            min-height: 70vh;
        }

        .section-content {
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        .section-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- About Section & Profile Upload --- */
        .about-container {
            display: flex;
            align-items: center;
            gap: 3rem;
            flex-wrap: wrap;
        }

        .profile-wrapper {
            position: relative;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            margin: 0 auto;
            cursor: pointer;
            border: 4px solid var(--accent-blue);
            overflow: hidden;
            transition: var(--transition);
        }

        .profile-wrapper:hover {
            border-color: var(--accent-green);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.5);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .profile-wrapper:hover .profile-img {
            filter: brightness(0.7);
        }

        .upload-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            opacity: 0;
            transition: var(--transition);
            text-align: center;
            pointer-events: none;
        }

        .profile-wrapper:hover .upload-overlay {
            opacity: 1;
        }

        #file-upload {
            display: none;
        }

        .about-text {
            flex: 1;
            min-width: 300px;
        }

        .about-text h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .about-text h3 {
            color: var(--accent-blue);
            margin-bottom: 1.5rem;
            font-weight: 400;
        }

        /* --- Grid Layouts for Cards --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--gradient-1);
            transform: scaleX(0);
            transform-origin: left;
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.15);
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card h3 {
            color: var(--accent-green);
            margin-bottom: 1rem;
            font-size: 1.4rem;
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .card-icon {
            font-size: 2rem;
            color: var(--accent-blue);
            margin-bottom: 1rem;
        }

        /* --- Skills Section specific --- */
        .skills-category {
            margin-bottom: 2rem;
        }
        
        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

            background: rgba(0, 212, 2
